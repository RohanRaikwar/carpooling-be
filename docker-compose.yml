services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: carpooling-backend:node22
    container_name: carpooling-api
    env_file:
      - .env
    environment:
      PROCESS_TYPE: api
      NODE_ENV: production
      PORT: 3000
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: postgresql://myuser:mypass@postgres:5432/my_db?schema=public
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  mail-worker:
    image: carpooling-backend:node22
    container_name: carpooling-mail-worker
    env_file:
      - .env
    environment:
      PROCESS_TYPE: mail-worker
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: postgresql://myuser:mypass@postgres:5432/my_db?schema=public
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  sms-worker:
    image: carpooling-backend:node22
    container_name: carpooling-sms-worker
    env_file:
      - .env
    environment:
      PROCESS_TYPE: sms-worker
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: postgresql://myuser:mypass@postgres:5432/my_db?schema=public
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: carpooling-postgres
    environment:
      POSTGRES_DB: my_db
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypass
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d my_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: carpooling-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
